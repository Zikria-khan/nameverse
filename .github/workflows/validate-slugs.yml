name: Validate Slugs and URLs

on:
  push:
    branches: [main, master]
    paths:
      - 'public/data/blog-posts.json'
      - '**/*.{js,jsx,ts,tsx,mjs}'
  pull_request:
    branches: [main, master]
    paths:
      - 'public/data/blog-posts.json'
      - '**/*.{js,jsx,ts,tsx,mjs}'

jobs:
  validate-slugs:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm ci
      - run: node scripts/ci-validate-slugs.js